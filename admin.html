<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Antakya Perfumes</title>
  <link rel="stylesheet" href="css/shared.css">
  <style>
    .admin-wrap { max-width:1200px; margin:0 auto; padding:120px 56px 100px; }
    .admin-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; flex-wrap:wrap; gap:16px; }
    .admin-title { font-family:'Cormorant Garamond',serif; font-size:2.4rem; font-weight:300; color:var(--cream); }
    .admin-title em { color:var(--gold); font-style:italic; }
    .admin-badge { font-size:.55rem; letter-spacing:.4em; text-transform:uppercase; color:var(--black); background:var(--gold); padding:5px 14px; font-weight:600; }

    /* ── TABS ── */
    .admin-tabs { display:flex; gap:0; border-bottom:1px solid rgba(201,168,76,.15); margin-bottom:36px; }
    .admin-tab { background:none; border:none; border-bottom:2px solid transparent; color:var(--muted); font-size:.65rem; letter-spacing:.25em; text-transform:uppercase; padding:12px 24px; cursor:pointer; font-family:'Jost',sans-serif; transition:color .3s,border-color .3s; margin-bottom:-1px; }
    .admin-tab.active { color:var(--gold); border-bottom-color:var(--gold); }
    .admin-panel { display:none; }
    .admin-panel.show { display:block; }

    /* ── STATS BAR ── */
    .admin-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:36px; }
    .astat { background:var(--dark-2); border:1px solid rgba(201,168,76,.1); padding:20px 24px; }
    .astat-num { font-family:'Cormorant Garamond',serif; font-size:2rem; color:var(--gold); }
    .astat-lbl { font-size:.58rem; letter-spacing:.28em; text-transform:uppercase; color:var(--muted); margin-top:4px; }

    /* ── ORDERS TABLE ── */
    .admin-table { width:100%; border-collapse:collapse; }
    .admin-table th { font-size:.58rem; letter-spacing:.3em; text-transform:uppercase; color:var(--gold); border-bottom:1px solid rgba(201,168,76,.2); padding:10px 12px; text-align:left; }
    .admin-table td { font-size:.76rem; color:var(--cream); border-bottom:1px solid rgba(255,255,255,.04); padding:14px 12px; vertical-align:top; }
    .admin-table tr:hover td { background:rgba(201,168,76,.03); }
    .order-status { display:inline-block; font-size:.55rem; letter-spacing:.2em; text-transform:uppercase; padding:4px 10px; }
    .status-pending  { background:rgba(201,168,76,.12); color:var(--gold); }
    .status-shipped  { background:rgba(80,200,80,.1);   color:#6e9; }
    .status-fulfilled{ background:rgba(80,200,80,.18);  color:#4d8; }
    .status-cancelled{ background:rgba(230,80,80,.1);   color:#e66; }
    .order-detail { font-size:.68rem; color:var(--muted); line-height:1.7; }
    .admin-action-btn { background:none; border:1px solid rgba(201,168,76,.3); color:var(--gold); padding:5px 14px; font-size:.58rem; letter-spacing:.2em; text-transform:uppercase; cursor:pointer; font-family:'Jost',sans-serif; transition:background .3s,color .3s; }
    .admin-action-btn:hover { background:var(--gold); color:var(--black); }
    .admin-action-btn.danger { border-color:rgba(230,80,80,.4); color:#e66; }
    .admin-action-btn.danger:hover { background:#e66; color:#fff; border-color:#e66; }

    /* ── PRODUCT MANAGEMENT ── */
    .products-admin-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:32px; }
    .prod-admin-card { background:var(--dark-2); border:1px solid rgba(201,168,76,.1); padding:0; overflow:hidden; }
    .prod-admin-img { height:180px; overflow:hidden; position:relative; }
    .prod-admin-img img { width:100%; height:100%; object-fit:cover; filter:brightness(.8); }
    .prod-admin-img .avail-tag { position:absolute; top:10px; left:10px; font-size:.52rem; letter-spacing:.2em; text-transform:uppercase; padding:4px 10px; }
    .avail-yes { background:rgba(80,200,80,.15); color:#6e9; border:1px solid rgba(80,200,80,.3); }
    .avail-no  { background:rgba(230,80,80,.15);  color:#e66; border:1px solid rgba(230,80,80,.3); }
    .prod-admin-body { padding:16px 18px; }
    .prod-admin-name { font-family:'Cormorant Garamond',serif; font-size:1.1rem; color:var(--cream); margin-bottom:2px; }
    .prod-admin-sub  { font-size:.62rem; color:var(--muted); margin-bottom:12px; }
    .prod-admin-actions { display:flex; gap:8px; flex-wrap:wrap; }

    /* ── ADD / EDIT FORM ── */
    .admin-form { background:var(--dark-2); border:1px solid rgba(201,168,76,.15); padding:32px; margin-bottom:36px; }
    .admin-form h3 { font-family:'Cormorant Garamond',serif; font-size:1.4rem; color:var(--cream); margin-bottom:24px; }
    .admin-form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .admin-form-grid .full { grid-column:1/-1; }
    .form-group { display:flex; flex-direction:column; gap:6px; }
    .form-group label { font-size:.58rem; letter-spacing:.3em; text-transform:uppercase; color:var(--muted); }
    .form-input { background:var(--dark-3); border:1px solid rgba(201,168,76,.18); color:var(--cream); padding:12px 16px; font-size:.82rem; font-family:'Jost',sans-serif; outline:none; transition:border-color .3s; width:100%; }
    .form-input:focus { border-color:var(--gold); }
    .form-select { background:var(--dark-3); border:1px solid rgba(201,168,76,.18); color:var(--cream); padding:12px 16px; font-size:.78rem; font-family:'Jost',sans-serif; outline:none; width:100%; -webkit-appearance:none; appearance:none; cursor:pointer; }
    .form-select:focus { border-color:var(--gold); }
    .form-submit { background:var(--gold); color:var(--black); border:none; padding:14px 36px; font-size:.62rem; letter-spacing:.3em; text-transform:uppercase; font-weight:500; cursor:pointer; font-family:'Jost',sans-serif; transition:background .3s; margin-top:8px; }
    .form-submit:hover { background:var(--gold-light); }
    .admin-msg { padding:12px 18px; font-size:.74rem; letter-spacing:.04em; margin-bottom:20px; display:none; }
    .admin-msg.ok  { background:rgba(80,200,80,.08); border-left:2px solid #6e9; color:#6e9; }
    .admin-msg.err { background:rgba(230,80,80,.08);  border-left:2px solid #e66; color:#e66; }
    .admin-msg.show { display:block; }

    /* ── LOGIN WALL ── */
    #admin-login-wall { max-width:420px; margin:0 auto; padding:80px 24px; text-align:center; }
    #admin-login-wall h2 { font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:300; color:var(--cream); margin-bottom:8px; }
    #admin-login-wall p { font-size:.78rem; color:var(--muted); margin-bottom:28px; }
    #admin-login-form { display:flex; flex-direction:column; gap:16px; text-align:left; }

    @media(max-width:900px) {
      .admin-wrap { padding:100px 24px 80px; }
      .admin-stats { grid-template-columns:1fr 1fr; }
      .products-admin-grid { grid-template-columns:1fr; }
      .admin-form-grid { grid-template-columns:1fr; }
      .admin-table { font-size:.68rem; }
    }
  </style>
</head>
<body>

      <path d="M0,0 C-3.8,-9 -3.8,-22 0,-31 C3.8,-22 3.8,-9 0,0Z" transform="rotate(-33)"/>
      <path d="M0,0 C-3.8,-9 -3.8,-22 0,-31 C3.8,-22 3.8,-9 0,0Z" transform="rotate(33)"/>
      <path d="M0,0 C-3.2,-7 -3.2,-18 0,-25 C3.2,-18 3.2,-7 0,0Z" transform="rotate(-63)"/>
      <path d="M0,0 C-3.2,-7 -3.2,-18 0,-25 C3.2,-18 3.2,-7 0,0Z" transform="rotate(63)"/>

<nav id="nav" class="scrolled">
  <a href="index.html" class="nav-logo">
    <svg viewBox="0 0 64 64" fill="var(--gold)"><use href="#lotus"/></svg>
    <span>ANTAKYA</span>
  </a>
  <ul class="nav-links">
    <li><a href="index.html#collection">Collection</a></li>
    <li><a href="index.html">Home</a></li>
  </ul>
  <div class="nav-right">
    <button class="nav-btn" onclick="Account.logout()">Sign Out</button>
  </div>

<!-- ── LOGIN WALL ──────────────────────────────────────────────── -->
<div id="admin-login-wall">
  <div style="margin-bottom:28px">
    <svg viewBox="0 0 64 64" fill="var(--gold)" width="40" height="40"><use href="#lotus"/></svg>
  </div>
  <h2>Admin <em style="color:var(--gold);font-style:italic">Access</em></h2>
  <p>Sign in with your admin credentials to manage the store.</p>
  <div class="admin-msg" id="login-err"></div>
  <form id="admin-login-form" onsubmit="adminLogin(event)">
    <div class="form-group"><label>Email</label><input type="email" id="al-email" class="form-input" placeholder="admin@antakyaperfumes.com" required></div>
    <div class="form-group"><label>Password</label><input type="password" id="al-pass" class="form-input" placeholder="••••••••" required></div>
    <button type="submit" class="form-submit" style="width:100%">Sign In to Admin</button>
  </form>
</div>

<!-- ── ADMIN DASHBOARD ─────────────────────────────────────────── -->
<div class="admin-wrap" id="admin-dashboard" style="display:none">
  <div class="admin-header">
    <div>
      <span class="admin-badge">Owner Dashboard</span>
      <h1 class="admin-title" style="margin-top:12px">Antakya <em>Admin</em></h1>
    </div>
    <button class="admin-action-btn danger" onclick="Account.logout()">Sign Out</button>
  </div>

  <!-- Stats -->
  <div class="admin-stats" id="admin-stats"></div>

  <!-- Tabs -->
  <div class="admin-tabs">
    <button class="admin-tab active" data-panel="orders">Orders</button>
    <button class="admin-tab" data-panel="products">Products</button>
    <button class="admin-tab" data-panel="add-product">Add Product</button>
  </div>

  <!-- ── ORDERS PANEL ── -->
  <div class="admin-panel show" id="panel-orders">
    <div id="orders-container"></div>
  </div>

  <!-- ── PRODUCTS PANEL ── -->
  <div class="admin-panel" id="panel-products">
    <div class="admin-msg" id="prod-msg"></div>
    <div class="products-admin-grid" id="products-admin-grid"></div>
  </div>

  <!-- ── ADD PRODUCT PANEL ── -->
  <div class="admin-panel" id="panel-add-product">
    <div class="admin-form">
      <h3 id="prod-form-title">Add New Product</h3>
      <div class="admin-msg" id="add-msg"></div>
      <input type="hidden" id="edit-id" value="">
      <div class="admin-form-grid">
        <div class="form-group"><label>Product Name</label><input type="text" id="pf-name" class="form-input" placeholder="e.g. Noir Intense"></div>
        <div class="form-group"><label>Inspired By</label><input type="text" id="pf-inspired" class="form-input" placeholder="e.g. Black Opium"></div>
        <div class="form-group full"><label>Fragrance Notes</label><input type="text" id="pf-notes" class="form-input" placeholder="e.g. Vanilla · Jasmine · Coffee"></div>
        <div class="form-group full"><label>Description</label><textarea id="pf-desc" class="form-input" rows="3" placeholder="Write a compelling product description…" style="resize:vertical"></textarea></div>
        <div class="form-group"><label>Price (€)</label><input type="number" id="pf-price" class="form-input" placeholder="42.99" step="0.01" min="0"></div>
        <div class="form-group"><label>Volume</label><input type="text" id="pf-volume" class="form-input" placeholder="50ml" value="50ml"></div>
        <div class="form-group"><label>Image Path</label><input type="text" id="pf-image" class="form-input" placeholder="images/bottle-clean1.jpg"></div>
        <div class="form-group"><label>Category</label>
          <select id="pf-category" class="form-select">
            <option value="men">Men's</option>
            <option value="women">Women's</option>
            <option value="unisex" selected>Unisex</option>
          </select>
        </div>
        <div class="form-group"><label>Season</label>
          <select id="pf-season" class="form-select">
            <option value="all-season" selected>All-Season</option>
            <option value="summer">Spring / Summer</option>
            <option value="winter">Autumn / Winter</option>
          </select>
        </div>
        <div class="form-group"><label>Occasion</label>
          <select id="pf-occasion" class="form-select">
            <option value="any" selected>Any Occasion</option>
            <option value="date-night">Date Night</option>
            <option value="office">Office</option>
            <option value="casual">Casual</option>
            <option value="special">Special Occasion</option>
          </select>
        </div>
        <div class="form-group"><label>Badge (optional)</label>
          <select id="pf-badge" class="form-select">
            <option value="">None</option>
            <option value="New">New</option>
            <option value="Bestseller">Bestseller</option>
            <option value="Limited">Limited</option>
          </select>
        </div>
        <div class="form-group"><label>Availability</label>
          <select id="pf-available" class="form-select">
            <option value="true" selected>Available</option>
            <option value="false">Sold Out</option>
          </select>
        </div>
        <div class="form-group"><label>New Arrival?</label>
          <select id="pf-isnew" class="form-select">
            <option value="false" selected>No</option>
            <option value="true">Yes</option>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:12px;margin-top:20px;flex-wrap:wrap">
        <button class="form-submit" onclick="saveProduct()">Save Product</button>
        <button class="admin-action-btn" onclick="clearProductForm()">Clear Form</button>
      </div>
    </div>
  </div>
</div>

<div class="cart-overlay" id="cart-overlay"></div>
<div id="cart-panel">
  <div class="cart-header"><h3>Your Cart</h3><button class="cart-header-close" id="close-cart">×</button></div>
  <div id="cart-items"></div>
  <div id="cart-footer">
    <p id="delivery-msg"></p>
    <div class="cart-total-row"><span class="cart-total-label">Total</span><span id="cart-total-val">€0,00</span></div>
    <a href="cart.html" class="cart-checkout-btn" onclick="Cart.close()">Proceed to Checkout</a>
  </div>
</div>

<script src="js/store.js"></script>
<script>
// ── Guard: redirect non-admins ──────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  if (Account.isAdmin()) {
    showDashboard();
  } else if (Account.isLoggedIn()) {
    window.location.href = 'account.html';
  }
  // Tab switching
  document.querySelectorAll('.admin-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('show'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.panel).classList.add('show');
    });
  });
});

function adminLogin(e) {
  e.preventDefault();
  const email = document.getElementById('al-email').value;
  const pass  = document.getElementById('al-pass').value;
  const res   = Account.login(email, pass);
  if (!res.ok || !res.admin) {
    const err = document.getElementById('login-err');
    err.textContent = res.error || 'Access denied. Admin credentials required.';
    err.className = 'admin-msg err show';
    return;
  }
  showDashboard();
}

function showDashboard() {
  document.getElementById('admin-login-wall').style.display = 'none';
  document.getElementById('admin-dashboard').style.display  = 'block';
  renderAdminStats();
  renderOrdersPanel();
  renderProductsAdmin();
}

// ── STATS ──────────────────────────────────────────────────────
function renderAdminStats() {
  const orders   = Orders.load();
  const revenue  = orders.reduce((s,o) => s + o.total, 0);
  const pending  = orders.filter(o => o.status === 'pending').length;
  const products = PRODUCTS.length;
  document.getElementById('admin-stats').innerHTML = `
    <div class="astat"><div class="astat-num">${orders.length}</div><div class="astat-lbl">Total Orders</div></div>
    <div class="astat"><div class="astat-num">${fmtPrice(revenue)}</div><div class="astat-lbl">Total Revenue</div></div>
    <div class="astat"><div class="astat-num">${pending}</div><div class="astat-lbl">Pending Orders</div></div>
    <div class="astat"><div class="astat-num">${products}</div><div class="astat-lbl">Products</div></div>`;
}

// ── ORDERS ─────────────────────────────────────────────────────
function renderOrdersPanel() {
  const orders = Orders.load();
  const el = document.getElementById('orders-container');
  if (orders.length === 0) {
    el.innerHTML = '<p style="color:var(--muted);font-size:.82rem;padding:40px 0">No orders yet. Orders placed via checkout will appear here.</p>';
    return;
  }
  el.innerHTML = `
    <table class="admin-table">
      <thead><tr>
        <th>Order ID</th><th>Date</th><th>Customer</th><th>Delivery Address</th><th>Items</th><th>Total</th><th>Status</th><th>Actions</th>
      </tr></thead>
      <tbody>${orders.map(o => `
        <tr>
          <td style="font-family:'Cormorant Garamond',serif;color:var(--gold)">${o.id}</td>
          <td class="order-detail">${new Date(o.date).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}</td>
          <td>
            <div style="color:var(--cream);font-size:.8rem">${o.buyer.firstName} ${o.buyer.lastName}</div>
            <div class="order-detail">${o.buyer.email}</div>
            <div class="order-detail">${o.buyer.phone || ''}</div>
          </td>
          <td class="order-detail">${o.buyer.address}<br>${o.buyer.city} ${o.buyer.postcode}</td>
          <td class="order-detail">${o.items.map(i => `${i.name} ×${i.qty}`).join('<br>')}</td>
          <td style="font-family:'Cormorant Garamond',serif;color:var(--gold)">${fmtPrice(o.total)}</td>
          <td><span class="order-status status-${o.status}">${o.status}</span></td>
          <td>
            <div style="display:flex;flex-direction:column;gap:6px">
              ${o.status === 'pending'   ? `<button class="admin-action-btn" onclick="updateOrderStatus('${o.id}','shipped')">Mark Shipped</button>` : ''}
              ${o.status === 'shipped'   ? `<button class="admin-action-btn" onclick="updateOrderStatus('${o.id}','fulfilled')">Mark Fulfilled</button>` : ''}
              ${o.status !== 'cancelled' ? `<button class="admin-action-btn danger" onclick="updateOrderStatus('${o.id}','cancelled')">Cancel</button>` : ''}
            </div>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function updateOrderStatus(id, status) {
  Orders.updateStatus(id, status);
  renderAdminStats();
  renderOrdersPanel();
}

// ── PRODUCTS ADMIN ──────────────────────────────────────────────
function renderProductsAdmin() {
  const el = document.getElementById('products-admin-grid');
  el.innerHTML = PRODUCTS.map(p => `
    <div class="prod-admin-card">
      <div class="prod-admin-img">
        <img src="${p.image}" alt="${p.name}">
        <span class="avail-tag ${p.available !== false ? 'avail-yes' : 'avail-no'}">${p.available !== false ? 'Available' : 'Sold Out'}</span>
      </div>
      <div class="prod-admin-body">
        <div class="prod-admin-name">${p.name}</div>
        <div class="prod-admin-sub">${p.inspiredBy} · ${fmtPrice(p.price)} · ${p.category}</div>
        <div class="prod-admin-actions">
          <button class="admin-action-btn" onclick="editProduct(${p.id})">Edit</button>
          <button class="admin-action-btn" onclick="toggleAvailability(${p.id})">${p.available !== false ? 'Mark Sold Out' : 'Mark Available'}</button>
          <button class="admin-action-btn danger" onclick="deleteProduct(${p.id})">Delete</button>
        </div>
      </div>
    </div>`).join('');
}

function toggleAvailability(id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) return;
  p.available = !(p.available !== false);
  saveProductsToStorage();
  renderProductsAdmin();
  renderAdminStats();
  const msg = document.getElementById('prod-msg');
  msg.textContent = `"${p.name}" marked as ${p.available ? 'Available' : 'Sold Out'}.`;
  msg.className = 'admin-msg ok show';
  setTimeout(() => msg.className = 'admin-msg', 2500);
}

function deleteProduct(id) {
  if (!confirm('Delete this product permanently?')) return;
  const idx = PRODUCTS.findIndex(x => x.id === id);
  if (idx >= 0) PRODUCTS.splice(idx, 1);
  saveProductsToStorage();
  renderProductsAdmin();
  renderAdminStats();
}

function editProduct(id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) return;
  document.getElementById('edit-id').value        = p.id;
  document.getElementById('pf-name').value        = p.name;
  document.getElementById('pf-inspired').value    = p.inspiredBy;
  document.getElementById('pf-notes').value       = p.notes;
  document.getElementById('pf-desc').value        = p.description || '';
  document.getElementById('pf-price').value       = p.price;
  document.getElementById('pf-volume').value      = p.volume;
  document.getElementById('pf-image').value       = p.image;
  document.getElementById('pf-category').value    = p.category;
  document.getElementById('pf-season').value      = p.season || 'all-season';
  document.getElementById('pf-occasion').value    = p.occasion || 'any';
  document.getElementById('pf-badge').value       = p.badge || '';
  document.getElementById('pf-available').value   = String(p.available !== false);
  document.getElementById('pf-isnew').value       = String(!!p.isNew);
  document.getElementById('prod-form-title').textContent = `Edit: ${p.name}`;

  // Switch to Add Product tab
  document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.admin-panel').forEach(panel => panel.classList.remove('show'));
  document.querySelector('[data-panel="add-product"]').classList.add('active');
  document.getElementById('panel-add-product').classList.add('show');
  document.getElementById('panel-add-product').scrollIntoView({ behavior:'smooth' });
}

function saveProduct() {
  const name = document.getElementById('pf-name').value.trim();
  if (!name) { showAddMsg('Product name is required.', 'err'); return; }

  const editId = parseInt(document.getElementById('edit-id').value);
  const prod = {
    id:          editId || Date.now(),
    name,
    inspiredBy:  document.getElementById('pf-inspired').value.trim(),
    notes:       document.getElementById('pf-notes').value.trim(),
    description: document.getElementById('pf-desc').value.trim(),
    price:       parseFloat(document.getElementById('pf-price').value) || 42.99,
    volume:      document.getElementById('pf-volume').value.trim() || '50ml',
    image:       document.getElementById('pf-image').value.trim() || 'images/bottle-clean1.jpg',
    category:    document.getElementById('pf-category').value,
    season:      document.getElementById('pf-season').value,
    occasion:    document.getElementById('pf-occasion').value,
    badge:       document.getElementById('pf-badge').value || null,
    available:   document.getElementById('pf-available').value === 'true',
    isNew:       document.getElementById('pf-isnew').value === 'true',
  };

  if (editId) {
    const idx = PRODUCTS.findIndex(x => x.id === editId);
    if (idx >= 0) PRODUCTS[idx] = prod;
  } else {
    PRODUCTS.push(prod);
  }

  saveProductsToStorage();
  renderProductsAdmin();
  renderAdminStats();
  clearProductForm();
  showAddMsg(editId ? `"${name}" updated successfully.` : `"${name}" added to the collection.`, 'ok');
}

function saveProductsToStorage() {
  // Save all product overrides (full list) to localStorage
  const base = PRODUCTS_DEFAULT.map(p => p.id);
  // Store only modified/new items vs default
  localStorage.setItem('antakya_products', JSON.stringify(PRODUCTS));
}

function clearProductForm() {
  ['pf-name','pf-inspired','pf-notes','pf-desc','pf-price','pf-volume','pf-image'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('pf-volume').value   = '50ml';
  document.getElementById('pf-image').value    = 'images/bottle-clean1.jpg';
  document.getElementById('pf-price').value    = '42.99';
  document.getElementById('edit-id').value     = '';
  document.getElementById('prod-form-title').textContent = 'Add New Product';
}

function showAddMsg(msg, type) {
  const el = document.getElementById('add-msg');
  el.textContent = msg;
  el.className = `admin-msg ${type} show`;
  setTimeout(() => el.className = 'admin-msg', 3000);
}
</script>
